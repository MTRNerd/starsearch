<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StarSearch</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: sans-serif; text-align: center; }
        @keyframes f { 0%, 100% { top: 40% } 50% { top: 50% } }
        #u { position: fixed; left: 50%; transform: translateX(-50%); animation: f 6s ease-in-out infinite; z-index: 9; }
        #u h1 { margin: 0 0 12px; font-size: 2em; letter-spacing: 2px; }
        #search-input { padding: 12px 20px; border-radius: 20px; width: 300px; border: none; outline: none; font-size: 16px; background: #fff; color: #000; }

        /* BROWSER */
        #browser {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a; display: none; flex-direction: column; z-index: 100;
        }

        /* NAV BAR */
        #nav {
            background: #111; padding: 8px 12px; display: flex;
            align-items: center; gap: 8px; border-bottom: 1px solid #222; flex-shrink: 0;
        }
        .nav-btn {
            background: #222; color: #ccc; border: none; padding: 6px 12px;
            cursor: pointer; border-radius: 6px; font-size: 14px; flex-shrink: 0;
        }
        .nav-btn:hover { background: #333; color: #fff; }
        #close-btn { background: #c0392b; color: #fff; }
        #close-btn:hover { background: #e74c3c; }
        #url-bar {
            flex: 1; padding: 7px 14px; border-radius: 20px; border: 1px solid #333;
            background: #1a1a1a; color: #fff; font-size: 14px; outline: none;
        }
        #url-bar:focus { border-color: #8ab4f8; }

        /* TABS */
        #tabs {
            display: flex; background: #0d0d0d; border-bottom: 1px solid #1a1a1a;
            flex-shrink: 0; overflow-x: auto; align-items: stretch;
        }
        #tabs::-webkit-scrollbar { height: 3px; }
        #tabs::-webkit-scrollbar-thumb { background: #333; }
        .tab {
            display: flex; align-items: center; gap: 8px; padding: 7px 14px;
            font-size: 13px; color: #777; cursor: pointer; border-right: 1px solid #1a1a1a;
            white-space: nowrap; max-width: 180px; min-width: 100px; flex-shrink: 0;
            user-select: none;
        }
        .tab span { overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .tab:hover { color: #bbb; background: #111; }
        .tab.active { color: #fff; background: #111; border-bottom: 2px solid #8ab4f8; }
        .tab-x { color: #444; font-size: 16px; line-height: 1; flex-shrink: 0; }
        .tab-x:hover { color: #fff; }
        #new-tab { padding: 7px 14px; color: #555; cursor: pointer; font-size: 20px;
            border: none; background: none; color: #555; flex-shrink: 0; }
        #new-tab:hover { color: #fff; }

        /* CONTENT */
        #content { flex: 1; position: relative; overflow: hidden; }
        .tab-pane { position: absolute; inset: 0; display: none; flex-direction: column; }
        .tab-pane.active { display: flex; }

        /* LOAD BAR */
        .lbar { height: 2px; background: #8ab4f8; width: 0; transition: width .3s; flex-shrink: 0; }

        /* RESULTS */
        .results { overflow-y: auto; padding: 24px; flex: 1; }
        .results h4 { color: #555; font-size: 13px; font-weight: normal; margin: 0 0 16px; text-align: left; }
        .result {
            text-align: left; margin-bottom: 12px; padding: 14px 16px;
            border-radius: 10px; background: #141414; border: 1px solid #2a2a2a; cursor: pointer;
        }
        .result:hover { border-color: #444; background: #1a1a1a; }
        .result h3 { color: #8ab4f8; margin: 0 0 4px; font-size: 15px; font-weight: 500; }
        .result p { color: #555; margin: 0; font-size: 13px; }

        /* IFRAME */
        .site-frame { flex: 1; border: none; }

        /* BLOCKED */
        .blocked {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            flex: 1; gap: 10px; padding: 30px;
        }
        .blocked h2 { color: #fff; margin: 0; }
        .blocked p { color: #666; font-size: 14px; max-width: 380px; margin: 0; }
        .blocked a { color: #8ab4f8; font-size: 15px; }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="u">
    <h1>✦ StarSearch</h1>
    <form id="search-form">
        <input id="search-input" type="text" placeholder="Search anything..." autocomplete="off">
    </form>
</div>

<div id="browser">
    <div id="nav">
        <button class="nav-btn" id="close-btn" onclick="closeBrowser()">✕</button>
        <button class="nav-btn" id="back-btn" onclick="goBack()">←</button>
        <button class="nav-btn" id="fwd-btn" onclick="goForward()">→</button>
        <button class="nav-btn" id="reload-btn" onclick="reloadFrame()">↺</button>
        <input id="url-bar" type="text" placeholder="Search or enter URL..." spellcheck="false">
        <button class="nav-btn" onclick="navigateBar()" style="background:#8ab4f8;color:#000;">Go</button>
    </div>
    <div id="tabs">
        <button id="new-tab" onclick="newTab()">+</button>
    </div>
    <div id="content"></div>
</div>

<canvas id="c"></canvas>

<script>
// ---- STARFIELD ----
const cv = document.getElementById('c'), cx = cv.getContext('2d');
let W, H, stars = [];
function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
window.onresize = resize; resize();
class Star {
    constructor() { this.reset(); }
    reset() { this.x = Math.random()*W; this.y = Math.random()*H; this.z = W; this.hue = Math.random()*360; }
    update() { this.z -= 4; if (this.z <= 0) this.reset(); }
    draw() {
        const f = W/this.z, px = (this.x-W/2)*f+W/2, py = (this.y-H/2)*f+H/2;
        cx.fillStyle = `hsl(${this.hue},99%,70%)`;
        cx.beginPath(); cx.arc(px, py, f*10, 0, 7); cx.fill();
    }
}
for (let i = 0; i < 50; i++) stars.push(new Star());
(function loop() {
    cx.fillStyle = 'rgba(0,0,0,.15)'; cx.fillRect(0,0,W,H);
    stars.forEach(s => { s.update(); s.draw(); });
    requestAnimationFrame(loop);
})();

// ---- PROXY ----
// Change this to your Replit URL once deployed!
// e.g. https://starsearch-proxy.yourusername.repl.co
const PROXY_BASE = window.location.origin;

function proxyUrl(url) {
    return `${PROXY_BASE}/proxy?url=${encodeURIComponent(url)}`;
}

// ---- TAB SYSTEM ----
let tabs = [], activeId = null, tabCount = 0;

function createTab(title = 'New Tab') {
    const id = 'tab' + (++tabCount);

    // Tab button
    const tabEl = document.createElement('div');
    tabEl.className = 'tab';
    tabEl.id = 'tbtn-' + id;
    tabEl.innerHTML = `<span id="tlabel-${id}">${title}</span><span class="tab-x" onclick="closeTab('${id}',event)">×</span>`;
    tabEl.onclick = e => { if (!e.target.classList.contains('tab-x')) switchTab(id); };
    document.getElementById('tabs').insertBefore(tabEl, document.getElementById('new-tab'));

    // Pane
    const pane = document.createElement('div');
    pane.className = 'tab-pane';
    pane.id = 'pane-' + id;
    pane.innerHTML = `
        <div class="lbar" id="lbar-${id}"></div>
        <div class="results" id="res-${id}">
            <div style="text-align:center;margin-top:80px;color:#333;font-size:15px;">Type something to search</div>
        </div>
        <iframe class="site-frame" id="frame-${id}" style="display:none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>
        <div class="blocked" id="blocked-${id}">
            <div style="font-size:42px">🚫</div>
            <h2>Site blocked embedding</h2>
            <p>This site refused to load even through the proxy. You can try opening it directly:</p>
            <a id="blink-${id}" href="#" target="_blank">Open in new tab ↗</a>
        </div>
    `;
    document.getElementById('content').appendChild(pane);

    const tab = { id, tabEl, pane, history: [], idx: -1, url: null };
    tabs.push(tab);
    switchTab(id);
    return tab;
}

function switchTab(id) {
    tabs.forEach(t => {
        t.tabEl.classList.remove('active');
        t.pane.classList.remove('active');
    });
    activeId = id;
    const t = getTab(id);
    if (!t) return;
    t.tabEl.classList.add('active');
    t.pane.classList.add('active');
    document.getElementById('url-bar').value = t.url || '';
}

function closeTab(id, e) {
    e.stopPropagation();
    const i = tabs.findIndex(t => t.id === id);
    if (tabs.length === 1) { closeBrowser(); return; }
    tabs[i].tabEl.remove();
    tabs[i].pane.remove();
    tabs.splice(i, 1);
    switchTab(tabs[Math.min(i, tabs.length-1)].id);
}

function newTab() { createTab(); }
function getTab(id) { return tabs.find(t => t.id === id); }
function active() { return getTab(activeId); }

function setLabel(tab, text) {
    document.getElementById('tlabel-' + tab.id).textContent = text.length > 18 ? text.slice(0,16)+'…' : text;
}

// ---- LOAD URL ----
function loadUrl(rawUrl, tab) {
    if (!tab) tab = active();
    if (!rawUrl) return;

    // If not a URL, treat as search
    if (!rawUrl.startsWith('http://') && !rawUrl.startsWith('https://')) {
        if (rawUrl.includes('.') && !rawUrl.includes(' ')) rawUrl = 'https://' + rawUrl;
        else { doSearch(rawUrl, tab); return; }
    }

    tab.url = rawUrl;
    document.getElementById('url-bar').value = rawUrl;
    setLabel(tab, new URL(rawUrl).hostname);

    // Push history
    tab.history = tab.history.slice(0, tab.idx + 1);
    tab.history.push(rawUrl);
    tab.idx = tab.history.length - 1;

    showFrame(tab, rawUrl);
}

function showFrame(tab, rawUrl) {
    const res = document.getElementById('res-' + tab.id);
    const frame = document.getElementById('frame-' + tab.id);
    const blocked = document.getElementById('blocked-' + tab.id);
    const lbar = document.getElementById('lbar-' + tab.id);

    res.style.display = 'none';
    blocked.style.display = 'none';
    frame.style.display = 'block';
    lbar.style.width = '40%';

    // Route through proxy
    frame.src = proxyUrl(rawUrl);
    frame.onload = () => { lbar.style.width = '100%'; setTimeout(() => lbar.style.width = '0', 400); };

    // Fallback: if proxy fails, show blocked screen
    frame.onerror = () => showBlocked(tab, rawUrl);

    // Some sites still block even via proxy — detect via timeout
    const check = setTimeout(() => {
        try { if (!frame.contentDocument || frame.contentDocument.body === null) showBlocked(tab, rawUrl); }
        catch(e) { /* cross-origin, probably loaded fine */ }
    }, 5000);
    frame.onload = () => {
        clearTimeout(check);
        lbar.style.width = '100%';
        setTimeout(() => lbar.style.width = '0', 400);
    };
}

function showBlocked(tab, url) {
    document.getElementById('frame-' + tab.id).style.display = 'none';
    const b = document.getElementById('blocked-' + tab.id);
    b.style.display = 'flex';
    document.getElementById('blink-' + tab.id).href = url;
}

function goBack() {
    const t = active();
    if (!t || t.idx <= 0) return;
    t.idx--;
    const url = t.history[t.idx];
    t.url = url;
    document.getElementById('url-bar').value = url;
    showFrame(t, url);
}

function goForward() {
    const t = active();
    if (!t || t.idx >= t.history.length - 1) return;
    t.idx++;
    const url = t.history[t.idx];
    t.url = url;
    document.getElementById('url-bar').value = url;
    showFrame(t, url);
}

function reloadFrame() {
    const t = active();
    if (t && t.url) showFrame(t, t.url);
}

function navigateBar() {
    const val = document.getElementById('url-bar').value.trim();
    if (val) loadUrl(val, active());
}

document.getElementById('url-bar').addEventListener('keydown', e => { if (e.key === 'Enter') navigateBar(); });

// ---- SEARCH ----
document.getElementById('search-form').onsubmit = e => {
    e.preventDefault();
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    document.getElementById('browser').style.display = 'flex';
    if (tabs.length === 0) createTab();
    doSearch(q, active());
};

function doSearch(query, tab) {
    if (!tab) tab = active();
    setLabel(tab, query);
    tab.url = null;
    document.getElementById('url-bar').value = query;

    // Hide frame, show results
    document.getElementById('frame-' + tab.id).style.display = 'none';
    document.getElementById('blocked-' + tab.id).style.display = 'none';
    const res = document.getElementById('res-' + tab.id);
    res.style.display = 'block';
    res.innerHTML = '<div style="text-align:center;margin-top:80px;color:#444;">Loading...</div>';

    const cbName = 'sr_' + tab.id + '_' + Date.now();
    const script = document.createElement('script');
    script.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(query)}&callback=${cbName}`;
    document.body.appendChild(script);
    script.remove();

    window[cbName] = data => {
        res.innerHTML = `<h4>Results for "<span style="color:#8ab4f8">${query}</span>"</h4>`;

        data[1].forEach(item => {
            const div = document.createElement('div');
            div.className = 'result';
            div.innerHTML = `<h3>${item}</h3><p>Wikipedia</p>`;
            div.onclick = () => loadUrl(`https://en.m.wikipedia.org/wiki/${encodeURIComponent(item.replace(/ /g,'_'))}`, tab);
            res.appendChild(div);
        });

        // Google search option
        const g = document.createElement('div');
        g.className = 'result';
        g.style.borderColor = '#8ab4f8';
        g.innerHTML = `<h3 style="color:#aaa">Search Google: "${query}"</h3><p>Loads via proxy</p>`;
        g.onclick = () => loadUrl(`https://www.google.com/search?q=${encodeURIComponent(query)}`, tab);
        res.appendChild(g);

        delete window[cbName];
    };
}

function closeBrowser() {
    document.getElementById('browser').style.display = 'none';
    tabs.forEach(t => { t.tabEl.remove(); t.pane.remove(); });
    tabs = []; activeId = null; tabCount = 0;
}

// Init one tab
createTab();
</script>
</body>
</html>
